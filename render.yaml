services:
  - type: web
    name: diabetes-medical-record
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: doctor-uploads
      mountPath: /app/uploads
      sizeGB: 1
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_POOL_SIZE
        value: "5"
      - key: DB_POOL_MIN_IDLE
        value: "3"
      - key: FLYWAY_ENABLED
        value: "true"
      - key: BOOTSTRAP_ADMIN_ENABLED
        value: "false"
      - key: TLD_SKIP_PATTERNS
        value: "*.jar"
      - key: DEVICE_API_KEY
        sync: false
      - key: BOOTSTRAP_ADMIN_USERNAME
        value: admin
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: BOOTSTRAP_ADMIN_NAME
        value: System Administrator
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.6-terra
      - key: OPENAI_TIMEOUT_SECONDS
        value: "20"
      - key: UPLOAD_DIR
        value: /app/uploads
