services:
  - type: web
    name: diabetes-medical-record
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: doctor-uploads
      mountPath: /app/uploads
      sizeGB: 1
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_POOL_SIZE
        value: "5"
      - key: DEVICE_API_KEY
        sync: false
      - key: BOOTSTRAP_ADMIN_USERNAME
        value: admin
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: BOOTSTRAP_ADMIN_NAME
        value: System Administrator
      - key: UPLOAD_DIR
        value: /app/uploads
