spring.application.name=diabetes-medical-record
spring.config.import=optional:file:.env[.properties]
server.port=${PORT:${SERVER_PORT:8082}}
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/diabetes_medical_record}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:3}
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.data-source-properties.connectTimeout=3
spring.datasource.hikari.data-source-properties.socketTimeout=15
spring.datasource.hikari.data-source-properties.tcpKeepAlive=true
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=7
spring.flyway.validate-on-migrate=true
server.forward-headers-strategy=framework
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=15s
server.tomcat.threads.max=40
server.tomcat.threads.min-spare=4
server.tomcat.max-connections=200
server.tomcat.accept-count=50
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=text/html,text/css,text/javascript,application/javascript,application/json,text/plain
server.servlet.jsp.init-parameters.development=false
server.servlet.jsp.init-parameters.checkInterval=60
server.servlet.jsp.init-parameters.modificationTestInterval=60
server.tomcat.additional-tld-skip-patterns=${TLD_SKIP_PATTERNS:}
app.upload-dir=${UPLOAD_DIR:./uploads}
app.bootstrap-admin.enabled=${BOOTSTRAP_ADMIN_ENABLED:false}
app.openai.api-key=${OPENAI_API_KEY:}
app.openai.model=${OPENAI_MODEL:gpt-5.6-terra}
app.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1/responses}
app.openai.timeout-seconds=${OPENAI_TIMEOUT_SECONDS:20}
